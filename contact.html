        nav a{margin:0 12px;text-decoration:none;color:white;font-weight:500;transition:0.3s;}

        .container{max-width:400px;margin:auto;padding:50px 20px;}
        h2{text-align:center;font-family:'Playfair Display',serif;}
        input,textarea,button{width:100%;padding:12px;margin:8px 0;border:1px solid #ff99cc;border-radius:6px;font-family:'DM Sans',sans-serif;}
        button{background:#ff99cc;color:white;border:none;cursor:pointer;transition:0.3s;}
        button:hover{background:#ff66aa;}
        footer{text-align:center;padding:15px;background:#ff99cc;color:white;margin-top:40px;}

<div class="container">
    <h2>Contact Me</h2>
    <form action="mailto:youremail@example.com" method="post" enctype="text/plain">

        <input type="email" name="email" placeholder="Your Email" required>

    </form>
