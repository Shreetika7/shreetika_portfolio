<!DOCTYPE html>
<html>
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;}
        body{margin:0;padding:0;font-family:'Jost',sans-serif;background:#fff5f9;color:#3a1a2e;}
        header{background:linear-gradient(135deg,#f472b6 0%,#ec4899 100%);color:white;padding:18px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;box-shadow:0 4px 20px rgba(236,72,153,0.3);}
        .logo{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;letter-spacing:1px;}
        div.nav a{margin:0 14px;text-decoration:none;color:rgba(255,255,255,0.92);font-weight:400;font-size:15px;letter-spacing:0.5px;transition:0.3s;}
        div.nav a:hover{color:#fff;border-bottom:1px solid white;padding-bottom:2px;}

        main{max-width:820px;margin:auto;padding:60px 24px;text-align:center;}
        .page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.9rem,4vw,2.6rem);font-weight:600;color:#c2185b;margin-bottom:8px;}
        .page-sub{color:#ad6e89;font-size:0.95rem;font-weight:300;margin-bottom:14px;}
        .divider{width:60px;height:3px;background:linear-gradient(90deg,#f472b6,#ec4899);border-radius:2px;margin:0 auto 36px;}

        .video-wrap{position:relative;padding-top:56.25%;border-radius:18px;overflow:hidden;box-shadow:0 10px 40px rgba(236,72,153,0.2);border:2px solid #fce7f3;}
        .video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}

        footer{text-align:center;padding:18px;background:linear-gradient(135deg,#f472b6,#ec4899);color:white;margin-top:60px;font-size:0.88rem;letter-spacing:0.3px;}
        @media(max-width:600px){div.nav a{display:block;margin:5px 0;}header{flex-direction:column;align-items:flex-start;gap:10px;}}
    </style>
</head>
<body>
<header>
    <div class="logo">Sritika.</div>
    <div class="nav">
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>

        <a href="contact.html">Contact</a>
        <a href="report.html">Report</a>
    </div>
</header>

    <p class="page-sub">A walkthrough of my portfolio and the projects I've built.</p>
    <div class="divider"></div>
    <div class="video-wrap">
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="Video Demo" allowfullscreen></iframe>
